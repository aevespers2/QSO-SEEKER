name: Documentation

on:
  pull_request:
    paths:
      - "README.md"
      - "docs/**"
      - "mkdocs.yml"
      - "punchlist.md"
      - "taskchain.md"
      - "release.md"
      - "changelog.md"
      - ".github/workflows/docs.yml"
  push:
    branches: [main]
    paths:
      - "README.md"
      - "docs/**"
      - "mkdocs.yml"
      - "punchlist.md"
      - "taskchain.md"
      - "release.md"
      - "changelog.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: documentation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  strict-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out exact submitted source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Assert exact clean source identity
        shell: bash
        run: |
          set -euo pipefail
          expected="${{ github.event.pull_request.head.sha || github.sha }}"
          actual="$(git rev-parse HEAD)"
          test "$actual" = "$expected"
          test -z "$(git status --porcelain)"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"

      - name: Install documentation toolchain
        run: python -m pip install --disable-pip-version-check "mkdocs==1.6.1"

      - name: Build documentation in strict mode
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports/documentation
          mkdocs build --strict 2>&1 | tee reports/documentation/mkdocs.log

      - name: Record exact-head evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports/documentation
          git rev-parse HEAD > reports/documentation/exact-head.txt
          python --version > reports/documentation/python-version.txt 2>&1 || true
          python -m pip freeze > reports/documentation/dependencies.txt 2>&1 || true
          find site -type f -print0 2>/dev/null | sort -z | xargs -0 sha256sum > reports/documentation/site-SHA256SUMS 2>/dev/null || true
          python - <<'PY'
          from hashlib import sha256
          from pathlib import Path

          root = Path("reports/documentation")
          lines = []
          for path in sorted(root.rglob("*")):
              if not path.is_file() or path.name == "SHA256SUMS":
                  continue
              lines.append(f"{sha256(path.read_bytes()).hexdigest()}  {path.relative_to(root).as_posix()}")
          (root / "SHA256SUMS").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Upload documentation evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: documentation-${{ github.event.pull_request.head.sha || github.sha }}
          path: |
            reports/documentation
            site
          if-no-files-found: error
          retention-days: 30
