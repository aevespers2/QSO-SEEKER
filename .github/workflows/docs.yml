name: Documentation

on:
  pull_request:
    paths:
      - "README.md"
      - "docs/**"
      - "mkdocs.yml"
      - "taskchain.md"
      - "release.md"
      - "changelog.md"
      - ".github/workflows/docs.yml"
  push:
    branches: [main]
    paths:
      - "README.md"
      - "docs/**"
      - "mkdocs.yml"
      - "taskchain.md"
      - "release.md"
      - "changelog.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  strict-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out exact submitted source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
      - name: Assert exact source identity
        shell: bash
        run: |
          set -euo pipefail
          expected="${{ github.event.pull_request.head.sha || github.sha }}"
          actual="$(git rev-parse HEAD)"
          test "$actual" = "$expected"
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"
      - name: Install documentation toolchain
        run: python -m pip install --disable-pip-version-check "mkdocs==1.6.1"
      - name: Build documentation in strict mode
        run: mkdocs build --strict
