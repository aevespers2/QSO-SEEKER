name: Security Envelope

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-envelope-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out exact submitted source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Assert exact source identity
        shell: bash
        env:
          EXPECTED_HEAD: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          actual="$(git rev-parse HEAD)"
          test "$actual" = "$EXPECTED_HEAD"
          printf 'verified_head=%s\n' "$actual"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install minimal test environment
        run: |
          python -m pip install -e . pytest

      - name: Verify capability envelope
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          PYTHONNOUSERSITE: "1"
        run: |
          set -euo pipefail
          mkdir -p reports/security-envelope
          python tools/verify_security_envelope.py 2>&1 | tee reports/security-envelope/capability-envelope.log

      - name: Run adversarial and deterministic tests
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          PYTHONNOUSERSITE: "1"
        run: |
          mkdir -p reports/security-envelope
          pytest --junitxml=reports/security-envelope/pytest.xml

      - name: Verify no hidden control characters in tracked text files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports/security-envelope
          python - <<'PY' 2>&1 | tee reports/security-envelope/hidden-controls.log
          from pathlib import Path

          forbidden = {"\u061c", "\u200b", "\u200c", "\u200d", "\u200e", "\u200f", "\u202a", "\u202b", "\u202c", "\u202d", "\u202e", "\u2060", "\u2066", "\u2067", "\u2068", "\u2069", "\ufeff"}
          failures = []
          for path in Path('.').rglob('*'):
              if not path.is_file() or '.git' in path.parts:
                  continue
              try:
                  text = path.read_text(encoding='utf-8')
              except (UnicodeDecodeError, OSError):
                  continue
              found = sorted({f"U+{ord(ch):04X}" for ch in text if ch in forbidden})
              if found:
                  failures.append(f"{path}: {', '.join(found)}")
          if failures:
              raise SystemExit("Hidden control characters found:\n" + "\n".join(failures))
          print('No forbidden hidden controls found.')
          PY

      - name: Record exact-head evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports/security-envelope
          git rev-parse HEAD > reports/security-envelope/exact-head.txt
          python --version > reports/security-envelope/python-version.txt 2>&1 || true
          python -m pip freeze > reports/security-envelope/dependencies.txt 2>&1 || true
          python - <<'PY'
          from hashlib import sha256
          from pathlib import Path

          root = Path("reports/security-envelope")
          lines = []
          for path in sorted(root.rglob("*")):
              if not path.is_file() or path.name == "SHA256SUMS":
                  continue
              lines.append(f"{sha256(path.read_bytes()).hexdigest()}  {path.relative_to(root).as_posix()}")
          (root / "SHA256SUMS").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Upload security evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: security-envelope-${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          path: reports/security-envelope
          if-no-files-found: error
          retention-days: 30
