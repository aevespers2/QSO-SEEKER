name: Security Envelope

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install minimal test environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest

      - name: Verify capability envelope
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          PYTHONNOUSERSITE: "1"
        run: python tools/verify_security_envelope.py

      - name: Run adversarial and deterministic tests
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          PYTHONNOUSERSITE: "1"
        run: pytest -q

      - name: Verify no hidden control characters in tracked text files
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          forbidden = {"\u061c", "\u200b", "\u200c", "\u200d", "\u200e", "\u200f", "\u202a", "\u202b", "\u202c", "\u202d", "\u202e", "\u2060", "\u2066", "\u2067", "\u2068", "\u2069", "\ufeff"}
          failures = []
          for path in Path('.').rglob('*'):
              if not path.is_file() or '.git' in path.parts:
                  continue
              try:
                  text = path.read_text(encoding='utf-8')
              except (UnicodeDecodeError, OSError):
                  continue
              found = sorted({f"U+{ord(ch):04X}" for ch in text if ch in forbidden})
              if found:
                  failures.append(f"{path}: {', '.join(found)}")
          if failures:
              raise SystemExit("Hidden control characters found:\n" + "\n".join(failures))
          print('No forbidden hidden controls found.')
          PY
