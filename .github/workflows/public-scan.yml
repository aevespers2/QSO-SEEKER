name: Public Repository Scan

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "PUBLIC owner/repository only. This input and all results are public. Do not enter secrets."
        required: true
        type: string
      scope:
        description: "Bounded scan scope"
        required: true
        default: metadata-and-readme
        type: choice
        options:
          - metadata-and-readme
          - metadata-readme-and-recent-commits

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate target
        env:
          TARGET: ${{ inputs.repository }}
        run: |
          python - <<'PY'
          import os, re
          target = os.environ['TARGET'].strip()
          if not re.fullmatch(r'[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+', target):
              raise SystemExit('Target must be exactly owner/repository')
          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as f:
              f.write(f'TARGET_REPOSITORY={target}\n')
          PY

      - name: Install minimal runtime
        run: python -m pip install -e .

      - name: Fetch bounded public data
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p scan
          gh api "repos/${TARGET_REPOSITORY}" > scan/repository.json
          gh api "repos/${TARGET_REPOSITORY}/readme" > scan/readme.json || echo '{}' > scan/readme.json
          if [ "${{ inputs.scope }}" = "metadata-readme-and-recent-commits" ]; then
            gh api "repos/${TARGET_REPOSITORY}/commits?per_page=10" > scan/commits.json
          else
            echo '[]' > scan/commits.json
          fi

      - name: Build inert records
        env:
          TARGET: ${{ inputs.repository }}
        run: |
          python - <<'PY'
          import base64, json, os
          from pathlib import Path
          repo = os.environ['TARGET'].strip()
          metadata = json.loads(Path('scan/repository.json').read_text())
          readme = json.loads(Path('scan/readme.json').read_text())
          commits = json.loads(Path('scan/commits.json').read_text())
          records = [
            {'repository': repo, 'path': '.github/repository-description', 'url': metadata.get('html_url', f'https://github.com/{repo}'), 'content': metadata.get('description') or '', 'source_kind': 'description'},
            {'repository': repo, 'path': '.github/repository-topics', 'url': metadata.get('html_url', f'https://github.com/{repo}'), 'content': ' '.join(metadata.get('topics') or []), 'source_kind': 'topic'},
          ]
          try:
              content = base64.b64decode(readme.get('content') or '').decode('utf-8', 'replace')[:120000]
          except Exception:
              content = ''
          records.append({'repository': repo, 'path': readme.get('path') or 'README.md', 'url': readme.get('html_url') or f'https://github.com/{repo}', 'content': content, 'source_kind': 'readme'})
          for item in commits[:10]:
              sha = item.get('sha') or ''
              message = (item.get('commit') or {}).get('message') or ''
              records.append({'repository': repo, 'path': f'.github/commit-message/{sha}', 'url': item.get('html_url') or f'https://github.com/{repo}/commit/{sha}', 'content': message, 'source_kind': 'commit'})
          Path('scan/input.json').write_text(json.dumps(records, indent=2), encoding='utf-8')
          PY

      - name: Generate public JSON and PDF evidence
        run: |
          unicernal-search sanitize scan/input.json --output scan/sanitized.json --audit scan/audit.json --report scan/evidence.json --pdf scan/evidence.pdf

      - name: Upload public scan artifact
        uses: actions/upload-artifact@v4
        with:
          name: qso-public-scan-${{ github.run_id }}
          path: scan/
          retention-days: 90
