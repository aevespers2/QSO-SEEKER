name: Action Planning

on:
  schedule:
    - cron: "5 * * * *"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out immutable source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Assert exact source identity
        shell: bash
        run: |
          expected="${{ github.event.pull_request.head.sha || github.sha }}"
          actual="$(git rev-parse HEAD)"
          test "$actual" = "$expected"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bounded test environment
        run: python -m pip install -e . pytest

      - name: Verify action protocol
        run: python -m pytest -q tests/test_action_protocol.py

      - name: Produce deterministic claim evidence
        shell: bash
        run: |
          set +e
          python -m unicernal_search.action_protocol \
            actions/action-chain.json \
            --actor QSOBuilder \
            --head-sha "$(git rev-parse HEAD)" \
            --max-steps 1 \
            --max-files 4 \
            --output action-plan.json
          status=$?
          set -e
          test "$status" -eq 0 -o "$status" -eq 3
          test -s action-plan.json

      - name: Retain action-plan evidence
        uses: actions/upload-artifact@v4
        with:
          name: action-plan-${{ github.run_id }}-${{ github.run_attempt }}
          path: action-plan.json
          if-no-files-found: error
          retention-days: 30
