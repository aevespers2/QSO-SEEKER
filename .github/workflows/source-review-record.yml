name: Source Review Record

on:
  pull_request:
    paths:
      - "docs/source-review-record.md"
      - "docs/examples/source-review-record-v1.json"
      - "scripts/validate_source_review_record.py"
      - "tests/test_source_review_record.py"
      - "reports/daily-seeker-review-20260723.*"
      - "mkdocs.yml"
      - ".github/workflows/source-review-record.yml"
  push:
    branches: [main]
    paths:
      - "docs/source-review-record.md"
      - "docs/examples/source-review-record-v1.json"
      - "scripts/validate_source_review_record.py"
      - "tests/test_source_review_record.py"
      - "reports/daily-seeker-review-20260723.*"
      - "mkdocs.yml"
      - ".github/workflows/source-review-record.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: source-review-record-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out exact submitted source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Assert exact clean source identity
        shell: bash
        run: |
          set -euo pipefail
          expected="${{ github.event.pull_request.head.sha || github.sha }}"
          actual="$(git rev-parse HEAD)"
          test "$actual" = "$expected"
          test -z "$(git status --porcelain)"

      - name: Initialize evidence directory
        if: always()
        shell: bash
        run: mkdir -p reports/source-review-record

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"

      - name: Install pinned documentation toolchain
        run: python -m pip install --disable-pip-version-check "mkdocs==1.6.1"

      - name: Validate synthetic source review record
        id: record
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python scripts/validate_source_review_record.py \
            docs/examples/source-review-record-v1.json \
            --now 2026-07-24T00:00:00+00:00 \
            2>&1 | tee reports/source-review-record/validator.log

      - name: Run hostile contradiction regressions
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python -m unittest discover -s tests -p 'test_source_review_record.py' -v \
            2>&1 | tee reports/source-review-record/tests.log

      - name: Build documentation in strict mode
        id: docs
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mkdocs build --strict \
            2>&1 | tee reports/source-review-record/mkdocs.log

      - name: Record exact-head evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git rev-parse HEAD > reports/source-review-record/exact-head.txt
          printf '%s\n' \
            "record=${{ steps.record.outcome }}" \
            "tests=${{ steps.tests.outcome }}" \
            "docs=${{ steps.docs.outcome }}" \
            > reports/source-review-record/outcomes.txt
          python --version > reports/source-review-record/python-version.txt 2>&1 || true
          python -m pip freeze > reports/source-review-record/dependencies.txt 2>&1 || true
          sha256sum \
            docs/source-review-record.md \
            docs/examples/source-review-record-v1.json \
            scripts/validate_source_review_record.py \
            tests/test_source_review_record.py \
            mkdocs.yml \
            > reports/source-review-record/source-SHA256SUMS
          find site -type f -print0 2>/dev/null | sort -z | xargs -0 -r sha256sum \
            > reports/source-review-record/site-SHA256SUMS 2>/dev/null || true
          python - <<'PY'
          from hashlib import sha256
          from pathlib import Path

          root = Path("reports/source-review-record")
          lines = []
          for path in sorted(root.rglob("*")):
              if not path.is_file() or path.name == "SHA256SUMS":
                  continue
              lines.append(
                  f"{sha256(path.read_bytes()).hexdigest()}  "
                  f"{path.relative_to(root).as_posix()}"
              )
          (root / "SHA256SUMS").write_text(
              "\n".join(lines) + "\n", encoding="utf-8"
          )
          PY

      - name: Upload source review evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: source-review-record-${{ github.event.pull_request.head.sha || github.sha }}
          path: |
            reports/source-review-record
            site
          if-no-files-found: error
          retention-days: 30

      - name: Enforce final fail-closed gate
        if: always()
        shell: bash
        run: |
          test "${{ steps.record.outcome }}" = "success"
          test "${{ steps.tests.outcome }}" = "success"
          test "${{ steps.docs.outcome }}" = "success"
